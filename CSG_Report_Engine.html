<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSG Report Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8871E;--orange-light:#FAE8D0;--orange-dark:#C06A0A;
  --dark:#141412;--dark2:#1E1E1B;--dark3:#2A2A26;
  --gray:#888780;--gray-light:#C8C7C0;--gray-xlight:#EDECEA;
  --bg:#F6F5F1;--card:#FFFFFF;--border:#E2E0D8;
  --text:#1A1A17;--text2:#5A5955;--text3:#8A8880;
  --green:#2E7D4F;--red:#C0392B;--blue:#1A5FA8;
  --sidebar-w:270px;--topbar-h:60px;--radius:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:14px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--dark);display:flex;flex-direction:column;overflow:hidden;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sb-header{padding:20px 18px 16px;border-bottom:1px solid var(--dark3)}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sb-logo-mark{width:32px;height:32px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-mark svg{width:18px;height:18px;fill:white}
.sb-brand{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:white;line-height:1.1}
.sb-brand span{display:block;font-size:10px;font-weight:300;color:var(--gray);font-family:'DM Sans',sans-serif;letter-spacing:.04em;margin-top:2px}
.sb-project{background:var(--dark3);border-radius:8px;padding:10px 12px;cursor:pointer;transition:background .15s}
.sb-project:hover{background:#333330}
.sb-project-label{font-size:9px;letter-spacing:.08em;color:var(--gray);text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between}
.sb-project-name{font-size:12px;color:white;font-weight:500;line-height:1.3}
.sb-project-sub{font-size:10px;color:var(--gray);margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--dark3) transparent}
.sb-section-label{font-size:9px;letter-spacing:.1em;color:var(--gray);text-transform:uppercase;padding:8px 8px 4px;font-weight:500}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;color:var(--gray-light)}
.sb-nav-item:hover{background:var(--dark3);color:white}
.sb-nav-item.active{background:rgba(232,135,30,.15);color:var(--orange)}
.nav-icon{width:18px;text-align:center;font-size:13px;flex-shrink:0;color:var(--gray)}
.nav-text{flex:1;font-size:12px;font-weight:500;line-height:1.2}
.nav-sub{font-size:9px;font-weight:300;color:var(--gray);margin-top:1px}
.nav-status{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-status.empty{background:var(--dark3);border:1px solid var(--dark2)}
.nav-status.partial{background:rgba(232,135,30,.5)}
.nav-status.done{background:var(--green)}
.sb-footer{padding:12px 14px;border-top:1px solid var(--dark3)}
.progress-bar-wrap{background:var(--dark3);border-radius:4px;height:4px;margin-top:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--orange);border-radius:4px;transition:width .5s ease}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.progress-label span{font-size:10px;color:var(--gray)}
.progress-label strong{font-size:11px;color:white}
.save-indicator{font-size:9px;color:var(--gray);text-align:center;margin-top:8px;min-height:14px;transition:color .3s}
.save-indicator.saving{color:var(--orange)}
.save-indicator.saved{color:var(--green)}
.topbar{height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-title{flex:1}
.topbar-title h2{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--text);line-height:1}
.topbar-title p{font-size:11px;color:var(--text3);margin-top:2px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-primary{background:var(--orange);color:white}
.btn-primary:hover{background:var(--orange-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,135,30,.3)}
.btn-secondary{background:var(--gray-xlight);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--gray-xlight)}
.btn-ai{background:linear-gradient(135deg,#1a1a17,#2a2a26);color:white;border:1px solid rgba(255,255,255,.1)}
.btn-ai:hover{background:linear-gradient(135deg,#2a2a26,#3a3a36)}
.btn-ai:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}
.btn-danger{background:#FEF2F2;color:var(--red);border:1px solid #FECACA}
.btn-danger:hover{background:#FEE2E2}
.content{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.section-header{margin-bottom:20px}
.section-badge{display:inline-flex;align-items:center;gap:6px;background:var(--orange-light);color:var(--orange-dark);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:600;letter-spacing:.05em;margin-bottom:10px}
.section-header h1{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1.2}
.section-header p{font-size:13px;color:var(--text2);margin-top:6px;max-width:600px;line-height:1.5}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:600;color:var(--text);letter-spacing:.02em;display:flex;align-items:center;gap:8px}
.card-body{padding:18px}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--orange);background:var(--orange-light)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:28px;margin-bottom:8px;opacity:.6}
.upload-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.upload-sub{font-size:11px;color:var(--text3)}
.upload-accepts{display:inline-block;margin-top:8px;background:var(--gray-xlight);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.file-list{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 12px}
.file-icon{font-size:16px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-size:10px;color:var(--text3)}
.file-remove{background:none;border:none;cursor:pointer;color:var(--gray);font-size:14px;padding:2px;border-radius:4px;transition:color .1s;flex-shrink:0}
.file-remove:hover{color:var(--red)}
.file-status{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0;background:#DCFCE7;color:var(--green)}
.ai-action-bar{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.ai-status{flex:1;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:.06em;background:var(--dark);color:white;border-radius:4px;padding:2px 6px}
.textarea-wrap{position:relative}
.report-textarea{width:100%;min-height:200px;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);line-height:1.6;resize:vertical;background:var(--card);transition:border-color .15s;outline:none}
.report-textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,135,30,.1)}
.report-textarea.ai-populated{border-color:rgba(46,125,79,.3);background:#FAFFFE}
.report-textarea::placeholder{color:var(--text3)}
.char-count{position:absolute;bottom:8px;right:10px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;pointer-events:none}
.textarea-actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.02em}
.form-input,.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--card);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,135,30,.1)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.stack{display:flex;flex-direction:column;gap:16px}
.static-banner{display:flex;align-items:flex-start;gap:12px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:12px 14px;margin-bottom:16px}
.static-banner p{font-size:12px;color:#1E40AF;line-height:1.5}
.info-chip{display:inline-flex;align-items:center;gap:4px;background:var(--gray-xlight);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--text2)}
/* Projects screen */
.projects-screen{flex:1;overflow-y:auto;padding:32px;animation:fadeIn .2s ease}
.projects-header{margin-bottom:28px}
.projects-header h1{font-family:'Fraunces',serif;font-size:26px;font-weight:600}
.projects-header p{font-size:13px;color:var(--text2);margin-top:6px}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .15s;position:relative}
.project-card:hover{border-color:var(--orange);box-shadow:0 4px 16px rgba(232,135,30,.12);transform:translateY(-1px)}
.project-card-new{border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;min-height:120px;color:var(--text3)}
.project-card-new:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-light)}
.project-card-new-icon{font-size:28px}
.project-card-new-label{font-size:13px;font-weight:600}
.pc-ref{font-size:9px;font-weight:600;letter-spacing:.08em;color:var(--orange);background:var(--orange-light);border-radius:4px;padding:2px 6px;margin-bottom:8px;display:inline-block}
.pc-name{font-family:'Fraunces',serif;font-size:15px;font-weight:600;line-height:1.2;margin-bottom:4px}
.pc-address{font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.4}
.pc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pc-type{font-size:10px;font-weight:600;color:var(--text2)}
.pc-date{font-size:10px;color:var(--text3)}
.pc-delete{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--gray);font-size:14px;padding:4px;border-radius:4px;opacity:0;transition:all .15s}
.project-card:hover .pc-delete{opacity:1}
.pc-delete:hover{color:var(--red);background:#FEF2F2}
/* Loading */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.hidden{display:none}
.loading-logo{width:48px;height:48px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center}
.loading-logo svg{width:26px;height:26px;fill:white}
.loading-text{font-family:'Fraunces',serif;font-size:16px;font-weight:600}
.loading-sub{font-size:12px;color:var(--text3)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:stretch;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{width:780px;max-width:90vw;background:var(--card);margin-left:auto;height:100vh;display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.2);transform:translateX(40px);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.modal-overlay.open .modal{transform:translateX(0)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--dark)}
.modal-title{font-family:'Fraunces',serif;font-size:18px;color:white;font-weight:600}
.modal-sub{font-size:11px;color:var(--gray);margin-top:2px}
.modal-close{background:var(--dark3);border:none;color:var(--gray);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:white}
.modal-body{flex:1;overflow-y:auto;padding:0;scrollbar-width:thin}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
/* Compiled report */
.report-doc{padding:32px 40px;max-width:660px;margin:0 auto}
.report-doc-header{text-align:center;padding-bottom:24px;border-bottom:2px solid var(--dark);margin-bottom:24px}
.report-doc-logo-area{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.report-doc-logo-box{width:36px;height:36px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center}
.report-doc-logo-box svg{width:20px;height:20px;fill:white}
.report-doc-company{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.report-doc-meta{font-size:11px;color:var(--text3);margin-top:6px}
.report-doc-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin:12px 0 4px}
.report-section{margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.report-section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}
.report-section-num{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--orange);background:var(--orange-light);padding:3px 8px;border-radius:4px;white-space:nowrap}
.report-section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:500}
.report-section-content{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.report-section-empty{font-size:12px;color:var(--text3);font-style:italic;background:var(--bg);border-radius:6px;padding:12px 14px;border:1px dashed var(--border)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:700px){.shell{flex-direction:column}.sidebar{width:100%;min-width:0;flex-direction:row;height:auto}.sb-header,.sb-footer{display:none}.sb-nav{display:flex;flex-direction:row;padding:6px;gap:4px;overflow-x:auto}.sb-section-label,.nav-sub,.nav-status{display:none}.sb-nav-item{padding:6px 10px;flex-direction:column;gap:2px;min-width:60px;align-items:center}.form-grid,.two-col{grid-template-columns:1fr}.projects-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 19h20L12 2zm0 4l7 13H5L12 6z"/></svg></div>
  <div class="loading-text">CSG Report Engine</div>
  <div class="loading-sub" id="loading-sub">Connecting to database…</div>
</div>

<div class="shell" id="app-shell" style="display:none">
  <aside class="sidebar">
    <div class="sb-header">
      <div class="sb-logo">
        <div class="sb-logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 19h20L12 2zm0 4l7 13H5L12 6z"/></svg></div>
        <div class="sb-brand">CSG Report Engine<span>Cuthbert Smith Group Inc.</span></div>
      </div>
      <div class="sb-project" onclick="goToProjects()" title="Switch project">
        <div class="sb-project-label">Active project <span style="font-size:8px">← switch</span></div>
        <div class="sb-project-name" id="sb-project-name">No project selected</div>
        <div class="sb-project-sub" id="sb-project-sub">—</div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer">
      <div class="progress-label"><span>Report completion</span><strong id="progress-pct">0%</strong></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
      <div class="save-indicator" id="save-indicator">All changes saved</div>
    </div>
  </aside>

  <main class="main" id="main-area">
    <div id="projects-view" style="display:none;flex:1;overflow-y:auto" class="projects-screen">
      <div class="projects-header"><h1>Projects</h1><p>Select a project to continue, or create a new one.</p></div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
    <div id="editor-view" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <header class="topbar">
        <div class="topbar-title">
          <h2 id="topbar-title">Project Setup</h2>
          <p id="topbar-sub">Enter project details to begin</p>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-secondary btn-sm" onclick="clearSection()">Clear section</button>
          <button class="btn btn-primary" onclick="openCompile()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Compile Report
          </button>
        </div>
      </header>
      <div class="content" id="content"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="compile-modal">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title">Compiled Report</div><div class="modal-sub" id="modal-report-type">—</div></div>
      <button class="modal-close" onclick="closeCompile()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeCompile()">Close</button>
      <button class="btn btn-secondary btn-sm" onclick="copyReport()">Copy all text</button>
      <button class="btn btn-primary btn-sm" onclick="printReport()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Save as PDF
      </button>
    </div>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────
const SUPABASE_URL = 'https://sukbelpzqpaiqkxslzky.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1a2JlbHB6cXBhaXFreHNsemt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTUyNjYsImV4cCI6MjA5MjIzMTI2Nn0.eKGHdYNfRcGYawctY7JVhOJPh18orBoSVFmj5JLkRM0';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

if(typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ─────────────────────────────────────────────────────
const STATE = {
  activeSection:'setup', currentProjectId:null,
  project:{name:'',address:'',lender:'',lenderContact:'',borrower:'',reportType:'Progress Report',reportNumber:'',reportDate:new Date().toISOString().split('T')[0],siteVisitDate:'',loanAmount:'',interestRate:'',completionDate:'',csgRef:'',csgContact:''},
  sections:{}
};

function initSections(){
  SECTIONS.forEach(s=>{
    if(s.type==='group') return;
    STATE.sections[s.id]={files:[],text:s.type==='static'?s.staticText:'',status:s.type==='static'?'done':'empty',generating:false};
  });
}
initSections();

// ── SAVE / LOAD ───────────────────────────────────────────────
let saveTimer=null;
function scheduleSave(){ setSaveInd('saving'); clearTimeout(saveTimer); saveTimer=setTimeout(doSave,1400); }
function setSaveInd(s){
  const el=document.getElementById('save-indicator'); if(!el) return;
  el.className='save-indicator '+s;
  if(s==='saving') el.textContent='Saving…';
  else if(s==='saved'){el.textContent='✓ All changes saved';setTimeout(()=>{el.className='save-indicator';el.textContent='All changes saved';},2000);}
  else el.textContent='All changes saved';
}
async function doSave(){
  if(!STATE.currentProjectId) return;
  const p=STATE.project;
  try{
    await db.from('projects').upsert({id:STATE.currentProjectId,name:p.name,address:p.address,csg_ref:p.csgRef,report_type:p.reportType,report_number:p.reportNumber,report_date:p.reportDate||null,site_visit_date:p.siteVisitDate||null,csg_contact:p.csgContact,anticipated_completion:p.completionDate||null,lender:p.lender,lender_contact:p.lenderContact,borrower:p.borrower,loan_amount:p.loanAmount,interest_rate:p.interestRate});
    const rows=Object.entries(STATE.sections).map(([sid,sec])=>({project_id:STATE.currentProjectId,section_id:sid,section_text:sec.text||'',status:sec.status||'empty'}));
    if(rows.length) await db.from('report_sections').upsert(rows,{onConflict:'project_id,section_id'});
    setSaveInd('saved');
  }catch(e){console.error('Save error:',e);setSaveInd('');}
}

async function loadProject(pid){
  setLoading(true,'Loading project…');
  try{
    const{data:proj,error:pe}=await db.from('projects').select('*').eq('id',pid).single();
    if(pe) throw pe;
    STATE.currentProjectId=pid;
    STATE.project={name:proj.name||'',address:proj.address||'',csgRef:proj.csg_ref||'',reportType:proj.report_type||'Progress Report',reportNumber:proj.report_number||'',reportDate:proj.report_date||new Date().toISOString().split('T')[0],siteVisitDate:proj.site_visit_date||'',csgContact:proj.csg_contact||'',completionDate:proj.anticipated_completion||'',lender:proj.lender||'',lenderContact:proj.lender_contact||'',borrower:proj.borrower||'',loanAmount:proj.loan_amount||'',interestRate:proj.interest_rate||''};
    initSections();
    const{data:secs}=await db.from('report_sections').select('*').eq('project_id',pid);
    (secs||[]).forEach(r=>{if(STATE.sections[r.section_id]){STATE.sections[r.section_id].text=r.section_text||STATE.sections[r.section_id].text;STATE.sections[r.section_id].status=r.status||STATE.sections[r.section_id].status;}});
    showEditorView(); updateSidebarProject(); renderNav(); switchSection('setup');
  }catch(e){console.error(e);showToast('Error loading project: '+e.message);}
  setLoading(false);
}

async function createNewProject(){
  setLoading(true,'Creating project…');
  try{
    const{data,error}=await db.from('projects').insert({name:'New Project',report_type:'Progress Report',report_date:new Date().toISOString().split('T')[0]}).select().single();
    if(error) throw error;
    await loadProject(data.id);
  }catch(e){console.error(e);showToast('Error creating project: '+e.message);setLoading(false);}
}

async function deleteProject(id,e){
  e.stopPropagation();
  if(!confirm('Delete this project and all its data? This cannot be undone.')) return;
  const{error}=await db.from('projects').delete().eq('id',id);
  if(error){showToast('Error deleting project');return;}
  if(STATE.currentProjectId===id){STATE.currentProjectId=null;initSections();}
  loadProjectsList();
}

async function loadProjectsList(){
  showProjectsView();
  const grid=document.getElementById('projects-grid');
  grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)"><div class="spinner" style="margin:0 auto 12px"></div><div>Loading projects…</div></div>';
  const{data:projects,error}=await db.from('projects').select('*').order('updated_at',{ascending:false});
  if(error){grid.innerHTML='<div style="color:var(--red);padding:20px">Error loading projects: '+error.message+'</div>';return;}
  const cards=(projects||[]).map(p=>`
    <div class="project-card" onclick="loadProject('${p.id}')">
      <button class="pc-delete" onclick="deleteProject('${p.id}',event)">✕</button>
      ${p.csg_ref?`<div class="pc-ref">${esc(p.csg_ref)}</div>`:''}
      <div class="pc-name">${esc(p.name||'Unnamed Project')}</div>
      <div class="pc-address">${esc(p.address||'No address set')}</div>
      <div class="pc-meta">
        <span class="pc-type">${esc(p.report_type||'Progress Report')}${p.report_number?' '+esc(p.report_number):''}</span>
        <span class="pc-date">${p.updated_at?new Date(p.updated_at).toLocaleDateString('en-CA'):'—'}</span>
      </div>
    </div>`).join('');
  grid.innerHTML=`<div class="project-card project-card-new" onclick="createNewProject()"><div class="project-card-new-icon">＋</div><div class="project-card-new-label">New Project</div></div>${cards}`;
}

  document.getElementById('sb-nav').innerHTML='';
}
function showEditorView(){
  const pv=document.getElementById('projects-view');
  const ev=document.getElementById('editor-view');
  pv.style.display='none'; ev.style.display='flex'; ev.style.flex='1'; ev.style.flexDirection='column'; ev.style.overflow='hidden';
}
function goToProjects(){loadProjectsList();}
function setLoading(show,msg){
  const o=document.getElementById('loading-overlay');
  if(show){o.classList.remove('hidden');document.getElementById('loading-sub').textContent=msg||'Loading…';document.getElementById('app-shell').style.display='none';}
  else{o.classList.add('hidden');document.getElementById('app-shell').style.display='flex';}
}
function updateSidebarProject(){
  const p=STATE.project;
  document.getElementById('sb-project-name').textContent=p.name||'New Project';
  document.getElementById('sb-project-sub').textContent=(p.reportType||'Progress Report')+(p.reportNumber?' '+p.reportNumber:'');
}

// ── NAV ───────────────────────────────────────────────────────
function renderNav(){
  const nav=document.getElementById('sb-nav');
  nav.innerHTML=SECTIONS.map(s=>{
    if(s.type==='group') return `<div class="sb-section-label" style="margin-top:10px">${s.nav}</div>`;
    const sec=STATE.sections[s.id]; const isActive=STATE.activeSection===s.id;
    const isSub=s.id.startsWith('s1_')||s.id.startsWith('s2_');
    return `<button class="sb-nav-item ${isActive?'active':''}" onclick="switchSection('${s.id}')" style="${isSub?'padding-left:22px':''}">
      <span class="nav-icon" style="${isSub?'font-size:8px;opacity:.6':''}">${s.icon}</span>
      <span style="flex:1"><div class="nav-text" style="${isSub?'font-size:11px':''}">${s.nav}</div><div class="nav-sub">${s.navSub}</div></span>
      <span class="nav-status ${sec?sec.status:'empty'}"></span>
    </button>`;
  }).join('');
  const completable=SECTIONS.filter(s=>s.type!=='form'&&s.type!=='group');
  const done=completable.filter(s=>STATE.sections[s.id]?.status==='done').length;
  const pct=Math.round((done/completable.length)*100);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
}

function switchSection(id){
  const def=SECTIONS.find(s=>s.id===id);
  if(!def||def.type==='group') return;
  STATE.activeSection=id; renderNav(); renderContent();
  document.getElementById('topbar-title').textContent=def.title;
  document.getElementById('topbar-sub').textContent=def.desc.substring(0,90)+(def.desc.length>90?'…':'');
}

// ── CONTENT ───────────────────────────────────────────────────
function renderContent(){
  const id=STATE.activeSection; const def=SECTIONS.find(s=>s.id===id); const sec=STATE.sections[id];
  const content=document.getElementById('content');
  if(def.type==='form'){content.innerHTML=renderSetupForm();return;}
  if(def.type==='static'){content.innerHTML=renderStaticSection(def,sec);return;}
  content.innerHTML=renderUploadSection(def,sec); updateCharCount(id);
}

function setProj(key,val){
  STATE.project[key]=val;

  if(key==='reportType'||key==='reportNumber') document.getElementById('sb-project-sub').textContent=STATE.project.reportType+(STATE.project.reportNumber?' '+STATE.project.reportNumber:'');

  </div>${fileListHTML}</div></div>
  <div class="card" style="margin-bottom:16px"><div class="card-header"><div class="card-title"><span class="ai-badge">✦ AI</span> Generate section text</div></div>
  <div class="card-body"><div class="ai-action-bar">${aiStatusHTML}<button class="btn btn-ai" onclick="generateSection('${def.id}')" ${isGen?'disabled':''}>${isGen?'<span class="spinner" style="width:12px;height:12px;border-width:1.5px"></span> Generating…':'✦ Generate with AI'}</button></div>

// ── FILE HANDLING ─────────────────────────────────────────────
function handleDragOver(e,id){e.preventDefault();document.getElementById(`drop-${id}`)?.classList.add('drag-over');}
function handleDragLeave(e,id){document.getElementById(`drop-${id}`)?.classList.remove('drag-over');}
function handleDrop(e,id){e.preventDefault();document.getElementById(`drop-${id}`)?.classList.remove('drag-over');addFiles(id,Array.from(e.dataTransfer.files));}
function handleFileSelect(e,id){addFiles(id,Array.from(e.target.files));}
function addFiles(id,files){files.forEach(f=>STATE.sections[id].files.push(f));if(STATE.sections[id].status==='empty')STATE.sections[id].status='partial';renderContent();}
function removeFile(id,idx){STATE.sections[id].files.splice(idx,1);if(!STATE.sections[id].files.length&&STATE.sections[id].status==='partial')STATE.sections[id].status='empty';renderContent();}
function getFileIcon(n){const icons={pdf:'📄',xlsx:'📊',xls:'📊',csv:'📊',docx:'📝',txt:'📃',jpg:'🖼',jpeg:'🖼',png:'🖼',heic:'🖼',webp:'🖼'};return icons[n.split('.').pop().toLowerCase()]||'📁';}
function formatSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}

async function extractFileContent(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','webp','heic'].includes(ext)) return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r({type:'image',data:e.target.result.split(',')[1],mediaType:file.type||'image/jpeg'});fr.readAsDataURL(file);});
  if(ext==='pdf'&&typeof pdfjsLib!=='undefined'){
    try{
      const ab=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:ab}).promise;
      let text=`[PDF: ${file.name}, ${pdf.numPages} pages]\n\n`;
      for(let i=1;i<=Math.min(pdf.numPages,15);i++){const page=await pdf.getPage(i);const ct=await page.getTextContent();const pt=ct.items.map(x=>x.str).join(' ');if(pt.trim())text+=`--- Page ${i} ---\n${pt}\n\n`;}
      return{type:'text',data:text};
    }catch{const ab=await file.arrayBuffer();const b64=btoa(String.fromCharCode(...new Uint8Array(ab)));return{type:'pdf_b64',data:b64};}
  }
  if(['xlsx','xls'].includes(ext)&&typeof XLSX!=='undefined'){
    try{const ab=await file.arrayBuffer();const wb=XLSX.read(ab,{type:'array'});let text=`[Excel: ${file.name}]\n\n`;wb.SheetNames.slice(0,5).forEach(n=>{const csv=XLSX.utils.sheet_to_csv(wb.Sheets[n],{blankrows:false});if(csv.trim())text+=`=== Sheet: ${n} ===\n${csv.substring(0,4000)}\n\n`;});return{type:'text',data:text};}
    catch{return{type:'text',data:`[Excel: ${file.name} — unable to parse]`};}
  }
  if(['csv','txt'].includes(ext)) return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r({type:'text',data:`[${ext.toUpperCase()}: ${file.name}]\n\n${e.target.result.substring(0,8000)}`});fr.readAsText(file);});
  return{type:'text',data:`[File: ${file.name}, ${formatSize(file.size)}]`};
}

// ── AI GENERATION ─────────────────────────────────────────────
async function generateSection(id){
  const def=SECTIONS.find(s=>s.id===id); const sec=STATE.sections[id];
  sec.generating=true; renderContent();
  try{
    const p=STATE.project;
    const ctx=`Project: ${p.name||'Unknown'}\nAddress: ${p.address||'Not provided'}\nLender: ${p.lender||'Not provided'} — Contact: ${p.lenderContact||'Not provided'}\nBorrower: ${p.borrower||'Not provided'}\nLoan Amount: ${p.loanAmount||'Not provided'}\nInterest Rate: ${p.interestRate||'Not provided'}\nReport Type: ${p.reportType} ${p.reportNumber||''}\nReport Date: ${p.reportDate||'Not provided'}\nSite Visit Date: ${p.siteVisitDate||'Not provided'}\nCSG Reference: ${p.csgRef||'Not provided'}\nCSG Signatory: ${p.csgContact||'Not provided'}\nAnticipated Completion: ${p.completionDate||'Not provided'}`;
    const blocks=[{type:'text',text:`PROJECT CONTEXT:\n${ctx}\n\n---\n\nDOCUMENT(S) UPLOADED:\n`}];
    if(sec.files.length>0){
      for(const file of sec.files){
        const ex=await extractFileContent(file);
        if(ex.type==='text') blocks.push({type:'text',text:ex.data});
        else if(ex.type==='image'){blocks.push({type:'text',text:`[Image: ${file.name}]\n`});blocks.push({type:'image',source:{type:'base64',media_type:ex.mediaType,data:ex.data}});}
        else if(ex.type==='pdf_b64') blocks.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:ex.data}});
      }
    }else{blocks.push({type:'text',text:'[No document uploaded — generate from project context and section requirements. Use [brackets] where specific figures are needed.]'});}
    blocks.push({type:'text',text:'\n\n---\n\nBased on the above, please generate the report section text as instructed.'});
    const sys=`You are a senior Quantity Surveyor at Cuthbert Smith Group Inc. (CSG), a professional quantity surveying and construction cost management firm in Alberta, Canada. You specialize in mortgage monitoring reports for institutional construction lenders.\n\nCSG writing style:\n- Professional, formal, third-person\n- Concise and factual — no unnecessary padding\n- Standard Canadian construction industry terminology\n- Specific figures stated precisely; uncertainties flagged with [brackets]\n- Reports addressed to the lender; borrower mentioned in third person\n- Standard phrases: "We have reviewed...", "We confirm...", "We have calculated..."`;
    const res=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys+'\n\n'+def.prompt,messages:[{role:'user',content:blocks}]})});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`API error ${res.status}`);}
    const data=await res.json();
    sec.text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    sec.status='partial'; scheduleSave();
  }catch(e){sec.text=`[Error generating text: ${e.message}]\n\nPlease try again or enter text manually.`;}
  sec.generating=false; renderContent(); renderNav();
  setTimeout(()=>{document.getElementById(`ta-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
}

// ── TEXT HANDLERS ─────────────────────────────────────────────
function handleTextChange(id){const ta=document.getElementById(`ta-${id}`);if(!ta)return;STATE.sections[id].text=ta.value;updateCharCount(id);scheduleSave();}
function updateCharCount(id){const ta=document.getElementById(`ta-${id}`);const cc=document.getElementById(`cc-${id}`);if(ta&&cc)cc.textContent=ta.value.length+' chars';}
function clearText(id){STATE.sections[id].text='';STATE.sections[id].status=STATE.sections[id].files.length>0?'partial':'empty';renderContent();renderNav();scheduleSave();}
function copyText(id){const ta=document.getElementById(`ta-${id}`);if(ta)navigator.clipboard.writeText(ta.value).then(()=>showToast('Copied!'));}
function markDone(id){if(!STATE.sections[id])return;STATE.sections[id].status=STATE.sections[id].status==='done'?'partial':'done';renderNav();scheduleSave();}
function clearSection(){const id=STATE.activeSection;if(id==='setup'||!STATE.sections[id])return;const def=SECTIONS.find(s=>s.id===id);if(def?.type==='static')return;STATE.sections[id].text='';STATE.sections[id].files=[];STATE.sections[id].status='empty';renderContent();renderNav();scheduleSave();}

function copyReport(){const el=document.getElementById('compiled-report');if(el)navigator.clipboard.writeText(el.innerText).then(()=>showToast('Report copied to clipboard'));}
function printReport(){
  const el=document.getElementById('compiled-report');if(!el)return;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>CSG Report</title><style>body{font-family:'DM Sans',system-ui,sans-serif;max-width:700px;margin:40px auto;color:#1a1a17;line-height:1.6;font-size:13px}.report-section{margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid #eee}.report-section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}.report-section-num{background:#FAE8D0;color:#C06A0A;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em}.report-section-title{font-size:16px;font-weight:500}.report-section-content{font-size:13px;color:#5A5955;line-height:1.7;white-space:pre-wrap}.report-section-empty{font-style:italic;color:#888}</style></head><body>${el.innerHTML}</body></html>`);
  w.document.close();w.print();
}

// ── UTILS ─────────────────────────────────────────────────────
function escapeHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function esc(s){return escapeHtml(s);}
function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#141412;color:white;padding:8px 18px;border-radius:8px;font-size:12px;z-index:9999;animation:fadeIn .2s ease';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCompile();});
document.getElementById('compile-modal').addEventListener('click',function(e){if(e.target===this)closeCompile();});

(async()=>{
  try{
    const{error}=await db.from('projects').select('id').limit(1);
    if(error) throw error;
    setLoading(false);
    loadProjectsList();
  }catch(e){
    document.getElementById('loading-sub').textContent='Database error: '+e.message;
    document.getElementById('loading-sub').style.color='#C0392B';
    console.error('DB connection error:',e);
  }
})();
</script>
